<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Availability — Global Coverage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0c0e13;
    --surface: #14171e;
    --surface2: #1a1e28;
    --border: #252a36;
    --border-light: #2e3446;
    --text: #e2e4ea;
    --text-dim: #7a8194;
    --text-muted: #4a5068;
    --accent: #6c9cfc;
    --accent-dim: #3a5a9c;
    --available: #34d399;
    --available-bg: rgba(52, 211, 153, 0.15);
    --limited: #fbbf24;
    --limited-bg: rgba(251, 191, 36, 0.12);
    --asleep: #1a1e28;
    --asleep-text: #3a3f50;
    --danger: #f87171;
    --coverage-high: #34d399;
    --coverage-med: #fbbf24;
    --coverage-low: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app {
    max-width: 1400px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  header {
    margin-bottom: 32px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header p {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 300;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-group label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  select, input[type="text"] {
    font-family: 'DM Sans', sans-serif;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  select { cursor: pointer; }

  .legend {
    display: flex;
    gap: 16px;
    margin-left: auto;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
  }

  .legend-dot.available { background: var(--available); }
  .legend-dot.limited { background: var(--limited); }
  .legend-dot.asleep { background: var(--border); }

  /* Coverage bar */
  .coverage-section {
    margin-bottom: 24px;
  }

  .coverage-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .coverage-bar {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 2px;
    background: var(--surface);
    border-radius: 10px;
    padding: 8px;
    border: 1px solid var(--border);
  }

  .coverage-hour {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .coverage-fill {
    width: 100%;
    height: 32px;
    border-radius: 4px;
    position: relative;
    transition: all 0.3s;
    cursor: pointer;
  }

  .coverage-fill:hover {
    transform: scaleY(1.1);
  }

  .coverage-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
  }

  .coverage-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }

  /* Grid */
  .grid-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .grid-header {
    display: grid;
    grid-template-columns: 200px repeat(24, 1fr);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }

  .grid-header-name {
    padding: 12px 16px;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
    display: flex;
    align-items: center;
  }

  .grid-header-hour {
    padding: 8px 2px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    font-weight: 400;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hour-marker {
    color: var(--text-dim);
  }

  .grid-row {
    display: grid;
    grid-template-columns: 200px repeat(24, 1fr);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .grid-row:last-child { border-bottom: none; }

  .grid-row:hover {
    background: rgba(108, 156, 252, 0.03);
  }

  .person-info {
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    border-right: 1px solid var(--border);
  }

  .person-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .person-tz {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 300;
  }

  .hour-cell {
    padding: 6px 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
  }

  .hour-block {
    width: 100%;
    height: 28px;
    border-radius: 4px;
    transition: all 0.2s;
  }

  .hour-block.available {
    background: var(--available);
    opacity: 0.7;
  }

  .hour-block.limited {
    background: var(--limited);
    opacity: 0.5;
  }

  .hour-block.asleep {
    background: var(--asleep);
    opacity: 0.4;
  }

  .hour-cell:hover .hour-block {
    opacity: 1;
    transform: scaleY(1.15);
  }

  /* Edit modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 560px;
    max-width: 90vw;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .modal-sub {
    color: var(--text-dim);
    font-size: 13px;
    margin-bottom: 20px;
  }

  .form-row {
    display: flex;
    gap: 12px;
    margin-bottom: 14px;
  }

  .form-field {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .form-field label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .form-field input, .form-field select {
    width: 100%;
  }

  .hour-editor {
    margin: 16px 0;
  }

  .hour-editor-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    font-weight: 500;
  }

  .hour-editor-grid {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 3px;
    margin-bottom: 8px;
  }

  .hour-editor-cell {
    height: 32px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .hour-editor-cell.available { background: var(--available); opacity: 0.7; }
  .hour-editor-cell.limited { background: var(--limited); opacity: 0.5; }
  .hour-editor-cell.asleep { background: var(--asleep); border: 1px solid var(--border); }

  .hour-editor-cell:hover { opacity: 1; transform: scaleY(1.1); }

  .hour-editor-times {
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    gap: 3px;
  }

  .hour-editor-time {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--text-muted);
  }

  .editor-hint {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    margin-top: 4px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: flex-end;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: 0.9; }

  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
  }

  .btn-secondary:hover { background: var(--surface2); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border-color: transparent;
  }

  .btn-danger:hover { background: rgba(248,113,113,0.1); }

  .btn-add {
    background: var(--surface2);
    color: var(--accent);
    border: 1px dashed var(--border-light);
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
    margin-top: 12px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .btn-add:hover {
    border-color: var(--accent);
    background: rgba(108, 156, 252, 0.05);
  }

  .tooltip {
    display: none;
    position: fixed;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    z-index: 50;
    pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .tooltip.active { display: block; }

  .now-line {
    position: absolute;
    width: 2px;
    background: var(--accent);
    top: 0;
    bottom: 0;
    z-index: 5;
    pointer-events: none;
  }

  .now-dot {
    position: absolute;
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    top: -4px;
    left: -3px;
  }

  @media (max-width: 900px) {
    .grid-header, .grid-row {
      grid-template-columns: 140px repeat(24, 1fr);
    }
    .person-info { padding: 8px 10px; }
    .legend { margin-left: 0; }
    .controls { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Team Availability</h1>
    <p>24-hour global coverage view — click any person's row to edit their schedule</p>
  </header>

  <div class="controls">
    <div class="control-group">
      <label>View in</label>
      <select id="tz-select"></select>
    </div>
    <div class="control-group">
      <label>Sort by</label>
      <select id="sort-select">
        <option value="name">Name</option>
        <option value="tz">Timezone (East → West)</option>
        <option value="available">Most Available</option>
      </select>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot available"></div>Available</div>
      <div class="legend-item"><div class="legend-dot limited"></div>Limited</div>
      <div class="legend-item"><div class="legend-dot asleep"></div>Asleep / Off</div>
    </div>
  </div>

  <div class="coverage-section">
    <div class="coverage-label">Team Coverage</div>
    <div class="coverage-bar" id="coverage-bar"></div>
  </div>

  <div class="grid-container">
    <div class="grid-header" id="grid-header"></div>
    <div id="grid-body"></div>
  </div>

  <button class="btn-add" id="btn-add">+ Add Team Member</button>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── Data ────────────────────────────────────────────────────────
// hours array: 24 entries, indexed 0-23 in that person's LOCAL time
// 'a' = available, 'l' = limited, 's' = asleep

const TIMEZONES = [
  { label: 'UTC-12 (Baker Island)', offset: -12 },
  { label: 'UTC-11 (Samoa)', offset: -11 },
  { label: 'UTC-10 (Hawaii)', offset: -10 },
  { label: 'UTC-9 (Alaska)', offset: -9 },
  { label: 'UTC-8 (Pacific)', offset: -8 },
  { label: 'UTC-7 (Mountain)', offset: -7 },
  { label: 'UTC-6 (Central)', offset: -6 },
  { label: 'UTC-5 (Eastern)', offset: -5 },
  { label: 'UTC-4 (Atlantic)', offset: -4 },
  { label: 'UTC-3 (São Paulo)', offset: -3 },
  { label: 'UTC-2', offset: -2 },
  { label: 'UTC-1 (Azores)', offset: -1 },
  { label: 'UTC+0 (London)', offset: 0 },
  { label: 'UTC+1 (Paris)', offset: 1 },
  { label: 'UTC+2 (Cairo)', offset: 2 },
  { label: 'UTC+3 (Moscow)', offset: 3 },
  { label: 'UTC+3:30 (Tehran)', offset: 3.5 },
  { label: 'UTC+4 (Dubai)', offset: 4 },
  { label: 'UTC+5 (Karachi)', offset: 5 },
  { label: 'UTC+5:30 (Mumbai)', offset: 5.5 },
  { label: 'UTC+5:45 (Kathmandu)', offset: 5.75 },
  { label: 'UTC+6 (Dhaka)', offset: 6 },
  { label: 'UTC+7 (Bangkok)', offset: 7 },
  { label: 'UTC+8 (Singapore)', offset: 8 },
  { label: 'UTC+9 (Tokyo)', offset: 9 },
  { label: 'UTC+9:30 (Adelaide)', offset: 9.5 },
  { label: 'UTC+10 (Sydney)', offset: 10 },
  { label: 'UTC+11 (Solomon Is.)', offset: 11 },
  { label: 'UTC+12 (Auckland)', offset: 12 },
  { label: 'UTC+13 (Tonga)', offset: 13 },
];

function makeSchedule(workStart, workEnd, limitedBefore, limitedAfter) {
  // workStart/workEnd in local hour, limited hours around edges
  const h = Array(24).fill('s');
  for (let i = 0; i < 24; i++) {
    if (i >= workStart && i < workEnd) h[i] = 'a';
    else if (i >= workStart - limitedBefore && i < workStart) h[i] = 'l';
    else if (i >= workEnd && i < workEnd + limitedAfter) h[i] = 'l';
  }
  return h;
}

let people = [
  { name: 'Sarah Chen', tz: 8, hours: makeSchedule(9, 18, 1, 1) },
  { name: 'Raj Patel', tz: 5.5, hours: makeSchedule(10, 19, 1, 2) },
  { name: 'Emma Wilson', tz: 0, hours: makeSchedule(9, 17, 1, 1) },
  { name: 'Carlos Ruiz', tz: -6, hours: makeSchedule(8, 17, 1, 1) },
  { name: 'Yuki Tanaka', tz: 9, hours: makeSchedule(9, 18, 0, 2) },
  { name: 'Fatima Al-Hassan', tz: 4, hours: makeSchedule(9, 17, 1, 0) },
  { name: 'Olena Kovalenko', tz: 2, hours: makeSchedule(8, 17, 1, 1) },
  { name: 'James Murphy', tz: -5, hours: makeSchedule(9, 18, 1, 2) },
  { name: 'Priya Sharma', tz: 5.5, hours: makeSchedule(10, 20, 0, 1) },
  { name: 'Lucas Silva', tz: -3, hours: makeSchedule(9, 18, 1, 1) },
  { name: 'Anna Johansson', tz: 1, hours: makeSchedule(8, 16, 1, 1) },
  { name: 'Wei Zhang', tz: 8, hours: makeSchedule(9, 19, 1, 2) },
  { name: 'Michael Brown', tz: -8, hours: makeSchedule(8, 17, 0, 2) },
  { name: 'Aisha Mohammed', tz: 3, hours: makeSchedule(8, 16, 1, 0) },
  { name: 'Thomas Müller', tz: 1, hours: makeSchedule(9, 18, 1, 1) },
  { name: 'Mei Lin', tz: 8, hours: makeSchedule(10, 19, 1, 1) },
  { name: 'Derek Johnson', tz: -6, hours: makeSchedule(7, 17, 0, 2) },
  { name: 'Sofia Garcia', tz: -5, hours: makeSchedule(9, 17, 1, 1) },
  { name: 'Kenji Watanabe', tz: 9, hours: (() => { let h = makeSchedule(9, 18, 1, 1); h[12] = 's'; h[13] = 's'; return h; })() },
  { name: 'Liam O\'Brien', tz: 10, hours: makeSchedule(8, 16, 1, 1) },
];

let viewOffset = -6; // default to Central
let editIndex = -1;
let editHours = [];
let paintMode = 'a';

// ── Timezone detection ────────────────────────────────
function detectLocalOffset() {
  const off = -(new Date().getTimezoneOffset() / 60);
  return off;
}

// ── Rendering ────────────────────────────────────────
function localToView(localHour, personTz) {
  return ((localHour + (viewOffset - personTz)) % 24 + 24) % 24;
}

function viewToLocal(viewHour, personTz) {
  return ((viewHour + (personTz - viewOffset)) % 24 + 24) % 24;
}

function formatHour(h) {
  const hr = Math.floor(h) % 24;
  const ampm = hr >= 12 ? 'p' : 'a';
  const display = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
  return display + ampm;
}

function formatHourFull(h) {
  const hr = Math.floor(h) % 24;
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const display = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
  return display + ':00 ' + ampm;
}

function getTzLabel(offset) {
  const sign = offset >= 0 ? '+' : '';
  const hrs = Math.floor(Math.abs(offset));
  const mins = (Math.abs(offset) % 1) * 60;
  return 'UTC' + sign + hrs + (mins ? ':' + mins.toString().padStart(2, '0') : '');
}

function sortPeople() {
  const mode = document.getElementById('sort-select').value;
  if (mode === 'name') people.sort((a, b) => a.name.localeCompare(b.name));
  else if (mode === 'tz') people.sort((a, b) => b.tz - a.tz);
  else if (mode === 'available') people.sort((a, b) => b.hours.filter(h => h === 'a').length - a.hours.filter(h => h === 'a').length);
}

function renderCoverage() {
  const bar = document.getElementById('coverage-bar');
  bar.innerHTML = '';

  for (let vHour = 0; vHour < 24; vHour++) {
    let count = 0;
    let limitedCount = 0;
    people.forEach(p => {
      const lh = viewToLocal(vHour, p.tz);
      const flh = Math.floor(lh);
      if (p.hours[flh] === 'a') count++;
      else if (p.hours[flh] === 'l') limitedCount++;
    });

    const total = count + limitedCount * 0.5;
    const pct = total / people.length;
    let color;
    if (pct > 0.5) color = 'var(--coverage-high)';
    else if (pct > 0.25) color = 'var(--coverage-med)';
    else if (pct > 0) color = 'var(--coverage-low)';
    else color = 'var(--border)';

    const el = document.createElement('div');
    el.className = 'coverage-hour';
    el.innerHTML = `
      <div class="coverage-fill" style="background:${color}; opacity:${Math.max(0.2, pct)}" 
           data-hour="${vHour}" data-count="${count}" data-limited="${limitedCount}"></div>
      <span class="coverage-count">${count}${limitedCount ? '+' + limitedCount : ''}</span>
      <span class="coverage-time">${formatHour(vHour)}</span>
    `;
    bar.appendChild(el);
  }
}

function renderHeader() {
  const hdr = document.getElementById('grid-header');
  hdr.innerHTML = '<div class="grid-header-name">Team Member</div>';
  for (let h = 0; h < 24; h++) {
    const div = document.createElement('div');
    div.className = 'grid-header-hour';
    const isMajor = h % 3 === 0;
    div.innerHTML = isMajor ? `<span class="hour-marker">${formatHour(h)}</span>` : '';
    hdr.appendChild(div);
  }
}

function renderGrid() {
  const body = document.getElementById('grid-body');
  body.innerHTML = '';

  people.forEach((person, idx) => {
    const row = document.createElement('div');
    row.className = 'grid-row';

    const info = document.createElement('div');
    info.className = 'person-info';
    info.innerHTML = `
      <span class="person-name">${person.name}</span>
      <span class="person-tz">${getTzLabel(person.tz)}</span>
    `;
    info.style.cursor = 'pointer';
    info.addEventListener('click', () => openEditor(idx));
    row.appendChild(info);

    for (let vHour = 0; vHour < 24; vHour++) {
      const lh = viewToLocal(vHour, person.tz);
      const flh = Math.floor(lh);
      const status = person.hours[flh];

      const cell = document.createElement('div');
      cell.className = 'hour-cell';
      cell.innerHTML = `<div class="hour-block ${status === 'a' ? 'available' : status === 'l' ? 'limited' : 'asleep'}"></div>`;
      
      cell.addEventListener('mouseenter', (e) => {
        const tt = document.getElementById('tooltip');
        const localTime = formatHourFull(flh);
        const statusLabel = status === 'a' ? '🟢 Available' : status === 'l' ? '🟡 Limited' : '⚫ Asleep/Off';
        tt.innerHTML = `<strong>${person.name}</strong><br>${statusLabel}<br>${localTime} local (${getTzLabel(person.tz)})`;
        tt.className = 'tooltip active';
        const rect = cell.getBoundingClientRect();
        tt.style.left = rect.left + 'px';
        tt.style.top = (rect.top - 70) + 'px';
      });

      cell.addEventListener('mouseleave', () => {
        document.getElementById('tooltip').className = 'tooltip';
      });

      row.appendChild(cell);
    }

    body.appendChild(row);
  });
}

function render() {
  sortPeople();
  renderCoverage();
  renderHeader();
  renderGrid();
}

// ── Editor ──────────────────────────────────────────
function openEditor(idx) {
  editIndex = idx;
  const person = idx >= 0 ? people[idx] : { name: '', tz: 0, hours: makeSchedule(9, 17, 1, 1) };
  editHours = [...person.hours];

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h2>${idx >= 0 ? 'Edit' : 'Add'} Team Member</h2>
    <p class="modal-sub">Click hours to cycle: Available → Limited → Asleep</p>
    <div class="form-row">
      <div class="form-field">
        <label>Name</label>
        <input type="text" id="edit-name" value="${person.name}">
      </div>
      <div class="form-field">
        <label>Timezone</label>
        <select id="edit-tz">${TIMEZONES.map(tz => 
          `<option value="${tz.offset}" ${tz.offset === person.tz ? 'selected' : ''}>${tz.label}</option>`
        ).join('')}</select>
      </div>
    </div>
    <div class="hour-editor">
      <div class="hour-editor-label">Schedule (in their local time)</div>
      <div class="hour-editor-grid" id="edit-grid"></div>
      <div class="hour-editor-times" id="edit-times"></div>
      <div class="editor-hint">Click to cycle: Available → Limited → Asleep. Drag to paint.</div>
    </div>
    <div class="btn-row">
      ${idx >= 0 ? '<button class="btn btn-danger" id="btn-delete">Delete</button>' : ''}
      <button class="btn btn-secondary" id="btn-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-save">Save</button>
    </div>
  `;

  renderEditGrid();

  document.getElementById('btn-cancel').addEventListener('click', closeEditor);
  document.getElementById('btn-save').addEventListener('click', saveEditor);
  if (idx >= 0) document.getElementById('btn-delete').addEventListener('click', deleteEditor);

  document.getElementById('modal-overlay').classList.add('active');
}

function renderEditGrid() {
  const grid = document.getElementById('edit-grid');
  const times = document.getElementById('edit-times');
  grid.innerHTML = '';
  times.innerHTML = '';

  let isDown = false;

  for (let h = 0; h < 24; h++) {
    const cell = document.createElement('div');
    const status = editHours[h];
    cell.className = `hour-editor-cell ${status === 'a' ? 'available' : status === 'l' ? 'limited' : 'asleep'}`;
    cell.dataset.hour = h;

    cell.addEventListener('mousedown', (e) => {
      e.preventDefault();
      isDown = true;
      cycleHour(h);
    });
    cell.addEventListener('mouseenter', () => { if (isDown) cycleHour(h); });

    grid.appendChild(cell);

    const t = document.createElement('div');
    t.className = 'hour-editor-time';
    t.textContent = h % 3 === 0 ? formatHour(h) : '';
    times.appendChild(t);
  }

  document.addEventListener('mouseup', () => { isDown = false; }, { once: false });
}

function cycleHour(h) {
  const order = ['a', 'l', 's'];
  const cur = order.indexOf(editHours[h]);
  editHours[h] = order[(cur + 1) % 3];
  renderEditGrid();
}

function saveEditor() {
  const name = document.getElementById('edit-name').value.trim();
  const tz = parseFloat(document.getElementById('edit-tz').value);
  if (!name) return;

  if (editIndex >= 0) {
    people[editIndex] = { name, tz, hours: [...editHours] };
  } else {
    people.push({ name, tz, hours: [...editHours] });
  }
  closeEditor();
  render();
}

function deleteEditor() {
  if (editIndex >= 0) {
    people.splice(editIndex, 1);
  }
  closeEditor();
  render();
}

function closeEditor() {
  document.getElementById('modal-overlay').classList.remove('active');
  editIndex = -1;
}

// ── Init ────────────────────────────────────────────
function init() {
  const sel = document.getElementById('tz-select');
  TIMEZONES.forEach(tz => {
    const opt = document.createElement('option');
    opt.value = tz.offset;
    opt.textContent = tz.label;
    sel.appendChild(opt);
  });

  // Detect local TZ
  const local = detectLocalOffset();
  const closest = TIMEZONES.reduce((prev, curr) =>
    Math.abs(curr.offset - local) < Math.abs(prev.offset - local) ? curr : prev
  );
  sel.value = closest.offset;
  viewOffset = closest.offset;

  sel.addEventListener('change', () => {
    viewOffset = parseFloat(sel.value);
    render();
  });

  document.getElementById('sort-select').addEventListener('change', render);
  document.getElementById('btn-add').addEventListener('click', () => openEditor(-1));

  document.getElementById('modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-overlay')) closeEditor();
  });

  render();
}

init();
</script>
</body>
</html>
